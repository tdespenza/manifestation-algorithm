name: Continuous Integration

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to run CI against'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All jobs run in parallel — no dependencies between them.
jobs:
  lint:
    name: Lint, Format & Architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:check

      - name: Validate Naming Conventions
        run: npm run naming:check

      - name: Check Formatting
        run: npm run format:check

      - name: Validate Dependency Rules
        run: npm run deps:validate

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Type Check
        run: npx vue-tsc --noEmit

  unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests with Coverage
        run: npx vitest run --reporter=verbose --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  mutation:
    name: Mutation Tests (JS + Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run JS Mutation Tests
        run: npm run test:mutation:js

      - name: Upload JS Mutation Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report-js
          path: reports/mutation/
          retention-days: 7

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libsoup-3.0-dev \
            pkg-config

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust Dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run Rust Mutation Tests
        run: npm run test:mutation:rust

      - name: Upload Rust Mutation Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report-rust
          path: src-tauri/mutants.out/
          retention-days: 7

  a11y:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Accessibility Tests
        run: npm run test:e2e:a11y
        env:
          CI: true

      - name: Upload A11y Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 7

      - name: Upload A11y Playwright Results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-a11y-results
          path: playwright-results/
          retention-days: 7

  visual:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Ensure visual snapshots exist
        shell: bash
        run: |
          if ! find e2e/snapshots -type f -name '*-chromium-linux.png' -print -quit | grep -q .; then
            echo "No Linux Chromium baselines found. Generating initial baselines for CI."
            npm run test:visual:update
          fi

      - name: Run Visual Tests
        run: npm run test:visual
        env:
          CI: true

      - name: Upload Visual Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Visual Playwright Results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-visual-results
          path: playwright-results/
          retention-days: 7

      - name: Upload Generated Visual Baselines
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-snapshots
          path: e2e/snapshots/
          retention-days: 7

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run End-to-End Tests
        shell: bash
        run: |
          mapfile -t core_tests < <(find e2e/tests -name '*.test.ts' \
            ! -name 'visual.test.ts' \
            ! -name 'a11y.test.ts' \
            ! -name 'a11y-axe.test.ts' \
            ! -name 'a11y-keyboard.test.ts' \
            ! -name 'a11y-extended.test.ts' | sort)
          npx playwright test --project=chromium "${core_tests[@]}"
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright Results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-results
          path: playwright-results/
          retention-days: 7

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libsoup-3.0-dev \
            pkg-config

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust Dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Rust Tests
        working-directory: src-tauri
        run: cargo test